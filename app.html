<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f8f4f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>习惯打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--f:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;--r:16px;--rs:10px;--t:.3s cubic-bezier(.4,0,.2,1);font-family:var(--f);font-size:max(16px,min(4.27vw,18px))}

[data-theme="latte"]{--bg:#f8f4f0;--bg2:#f0e8e0;--card:rgba(255,255,248,.88);--border:rgba(180,140,100,.15);--txt:#3d2b1f;--txt2:#8b7355;--txt3:#b8a080;--acc:#c8824a;--acc2:#e8b88a;--acc-light:#f5ebe0;--acc-txt:#7a5230;--ok:#5b8c5a;--ok-light:#e8f0e0;--danger:#d4756b;--danger-light:#fde8e4;--sh:0 2px 8px rgba(90,70,50,.08);--sh-lg:0 8px 30px rgba(90,70,50,.12);--overlay:rgba(60,40,30,.35);--inp:white;--inp-b:rgba(180,140,100,.25);--dot-bg:rgba(200,160,120,.12)}
[data-theme="mint"]{--bg:#f0f7f0;--bg2:#e0efe0;--card:rgba(255,255,255,.9);--border:rgba(100,160,120,.15);--txt:#1a3a2a;--txt2:#4a7a5a;--txt3:#7aaa8a;--acc:#3a9a6a;--acc2:#7acaaa;--acc-light:#e0f5ea;--acc-txt:#1a6a4a;--ok:#2a8a5a;--ok-light:#d0f0e0;--danger:#d46a5a;--danger-light:#fce8e4;--sh:0 2px 8px rgba(40,80,60,.08);--sh-lg:0 8px 30px rgba(40,80,60,.12);--overlay:rgba(20,50,35,.35);--inp:white;--inp-b:rgba(100,160,120,.25);--dot-bg:rgba(100,180,130,.1)}
[data-theme="peach"]{--bg:#faf0f3;--bg2:#f5e4ea;--card:rgba(255,255,255,.88);--border:rgba(200,120,140,.15);--txt:#3a2028;--txt2:#8a5a68;--txt3:#ba8a98;--acc:#da6a7a;--acc2:#ea9aaa;--acc-light:#fce8ec;--acc-txt:#9a3a4a;--ok:#6a8a6a;--ok-light:#e8f0e0;--danger:#d46a6a;--danger-light:#fce8e8;--sh:0 2px 8px rgba(120,60,70,.08);--sh-lg:0 8px 30px rgba(120,60,70,.12);--overlay:rgba(50,20,30,.35);--inp:white;--inp-b:rgba(200,120,140,.25);--dot-bg:rgba(210,140,160,.1)}
[data-theme="ocean"]{--bg:#eef4f8;--bg2:#dce8f0;--card:rgba(255,255,255,.9);--border:rgba(100,150,190,.15);--txt:#1a2a3a;--txt2:#4a6a8a;--txt3:#7a9aba;--acc:#3a7aba;--acc2:#7aaada;--acc-light:#e4eef8;--acc-txt:#1a4a7a;--ok:#3a8a6a;--ok-light:#e0f0e8;--danger:#d46a5a;--danger-light:#fce8e4;--sh:0 2px 8px rgba(30,60,90,.08);--sh-lg:0 8px 30px rgba(30,60,90,.12);--overlay:rgba(20,30,50,.35);--inp:white;--inp-b:rgba(100,150,190,.25);--dot-bg:rgba(100,160,200,.1)}
[data-theme="sunset"]{--bg:#f8f0ea;--bg2:#f0e0d0;--card:rgba(255,255,248,.88);--border:rgba(200,140,100,.15);--txt:#3a2818;--txt2:#8a6a4a;--txt3:#ba9a7a;--acc:#da7a3a;--acc2:#ea9a6a;--acc-light:#f8ece0;--acc-txt:#9a4a1a;--ok:#6a8a4a;--ok-light:#e8f0d8;--danger:#d46a4a;--danger-light:#fce8e0;--sh:0 2px 8px rgba(120,70,40,.08);--sh-lg:0 8px 30px rgba(120,70,40,.12);--overlay:rgba(50,30,15,.35);--inp:white;--inp-b:rgba(200,140,100,.25);--dot-bg:rgba(210,150,90,.1)}
[data-theme="midnight"]{--bg:#1a1a2e;--bg2:#16162a;--card:rgba(40,40,65,.9);--border:rgba(120,120,180,.12);--txt:#d8d8ee;--txt2:#8888b0;--txt3:#5a5a8a;--acc:#7a7ad8;--acc2:#aaaae8;--acc-light:#2a2a48;--acc-txt:#b0b0ee;--ok:#6aaa6a;--ok-light:#1a3a1a;--danger:#da6a6a;--danger-light:#3a1a1a;--sh:0 2px 8px rgba(0,0,0,.3);--sh-lg:0 8px 30px rgba(0,0,0,.5);--overlay:rgba(0,0,0,.55);--inp:#2a2a48;--inp-b:rgba(120,120,180,.2);--dot-bg:rgba(100,100,180,.06)}

html{min-height:100%;height:100%}
body{min-height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,var(--dot-bg) 1.2px,transparent 1.2px);background-size:24px 24px;opacity:.8}
body::after{content:'';position:fixed;top:-20%;right:-10%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,var(--acc-light) 0%,transparent 70%);pointer-events:none;z-index:0;opacity:.5}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px 120px;min-height:100vh}
.app::before{content:'';position:fixed;bottom:-15%;left:-15%;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,var(--acc2) 0%,transparent 70%);pointer-events:none;z-index:-1;opacity:.25}

.header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;background:linear-gradient(180deg,var(--bg) 60%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}@supports not (backdrop-filter:blur(16px)){.header{background:var(--bg)}}
.title{font-size:1.2rem;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--txt),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-icon{font-size:1.3rem;-webkit-text-fill-color:initial;background:none}
.actions{display:flex;gap:6px;align-items:center}
.badge{font-size:.7rem;font-weight:600;color:var(--txt2);padding:4px 12px;background:var(--card);border-radius:20px;border:1px solid var(--border);white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.15rem;box-shadow:var(--sh);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow var(--t);-webkit-user-select:none;user-select:none}
.icon-btn:active{transform:scale(.9)}.icon-btn:hover{transform:scale(1.08);box-shadow:var(--sh-lg)}

.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--card);border-radius:var(--r);padding:5px;border:1px solid var(--border);box-shadow:var(--sh)}
.tab{flex:1;padding:12px 4px;border:none;background:transparent;color:var(--txt3);font-size:.78rem;font-weight:600;cursor:pointer;border-radius:var(--rs);transition:all .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;letter-spacing:.3px;-webkit-user-select:none;user-select:none}.tab:active{transform:scale(.95)}
.tab .ti{font-size:1.2rem;line-height:1;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;transition:all .3s ease}
.tab.active .ti{background:var(--acc-light);box-shadow:0 0 0 1px var(--acc);transform:scale(1.05)}
.tab.active{background:transparent;color:var(--acc-txt);box-shadow:none}

.content{display:none;animation:fadeIn .3s ease}.content.active{display:block}

.list{display:flex;flex-direction:column;gap:10px}
.card{display:flex;align-items:center;gap:14px;padding:16px 16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow var(--t);position:relative;overflow:hidden}
.card:active{transform:scale(.985)}.card:hover{box-shadow:var(--sh-lg)}
.card::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:4px;border-radius:0 4px 4px 0;background:linear-gradient(180deg,var(--c-acc,#ccc),var(--c-acc2,var(--c-acc,#ccc)));opacity:.8}
.emoji{font-size:1.7rem;width:46px;text-align:center;flex-shrink:0;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.08))}
.info{flex:1;min-width:0}
.name{font-size:.95rem;font-weight:700;letter-spacing:-.2px;color:var(--txt)}
.meta{font-size:.7rem;font-weight:500;color:var(--txt3);margin-top:4px;display:flex;align-items:center;gap:4px}
.meta .ml{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:600}
.meta .ml-done{background:var(--ok-light);color:var(--ok)}.meta .ml-pend{background:var(--acc-light);color:var(--acc-txt)}
.check{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--txt3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:transparent;transition:all .35s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;font-family:inherit;font-weight:700;position:relative}
.check:active{transform:scale(.8)}
.check.checked{border-color:var(--ok);background:linear-gradient(135deg,var(--ok),#4ada7a);color:white;box-shadow:0 3px 12px rgba(0,180,80,.3);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.check.checked::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--ok);opacity:.3;animation:ringPulse 1s ease-out}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes ringPulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.4);opacity:0}}

.confetti{position:fixed;pointer-events:none;z-index:300;top:50%;left:50%}
.confetti span{position:absolute;border-radius:50%;animation:confettiFall 1.2s ease-out forwards}
.confetti span:nth-child(odd){border-radius:2px}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}100%{opacity:0;transform:translateY(150px) scale(0) rotate(720deg)}}

.empty{text-align:center;padding:56px 24px;color:var(--txt3)}
.empty .ei{font-size:3.5rem;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.empty p{font-size:.9rem;margin-bottom:16px;line-height:1.6}
.empty .add-first{background:linear-gradient(135deg,var(--acc),var(--acc2));color:white;border:none;padding:14px 32px;border-radius:28px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .25s ease;letter-spacing:.5px}.empty .add-first:active{transform:scale(.95)}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;background:var(--card);border-radius:var(--r);padding:10px 12px;border:1px solid var(--border);box-shadow:var(--sh)}
.cal-nav button{background:var(--bg);border:none;border-radius:var(--rs);width:36px;height:36px;cursor:pointer;font-size:1.1rem;color:var(--txt2);transition:all .2s ease;display:flex;align-items:center;justify-content:center;font-family:inherit}.cal-nav button:active{background:var(--acc-light);transform:scale(.9)}
.cal-title{font-size:1.05rem;font-weight:700;color:var(--txt)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{text-align:center;font-size:.65rem;color:var(--txt3);padding:6px 0;font-weight:600;letter-spacing:1px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--rs);font-size:.78rem;font-weight:500;color:var(--txt2);cursor:default;transition:all .2s ease;position:relative;min-height:42px}
.cal-day.other{color:var(--txt3);opacity:.35}
.cal-day.today{background:var(--acc-light);font-weight:700;color:var(--acc-txt);box-shadow:0 0 0 2px var(--acc)}
.cal-day .dot{width:6px;height:6px;border-radius:50%;background:var(--acc);margin-top:3px;box-shadow:0 0 5px var(--acc);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{padding:20px 12px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.stat-card .sv{font-size:2rem;font-weight:800;color:var(--acc);line-height:1.2;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .sl{font-size:.72rem;font-weight:500;color:var(--txt3);margin-top:4px;letter-spacing:.5px}
.stat-list{display:flex;flex-direction:column;gap:10px}
.stat-item{padding:16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
.stat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stat-hdr .se{font-size:1.4rem;width:34px;text-align:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.1))}
.stat-hdr .sn{font-size:.92rem;font-weight:700}
.stat-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--txt2);padding:4px 0}
.stat-row .sv2{font-weight:600;color:var(--txt)}
.stat-bar{height:6px;background:var(--acc-light);border-radius:8px;margin-top:10px;overflow:hidden}.stat-bar .fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2),var(--acc));background-size:200% 100%;border-radius:8px;transition:width .8s cubic-bezier(.4,0,.2,1);animation:gradientMove 2s ease infinite}
@keyframes gradientMove{0%{background-position:200% 0}100%{background-position:-200% 0}}

.add-btn{width:100%;padding:16px;border:2px dashed var(--txt3);border-radius:var(--r);background:var(--card);color:var(--txt3);font-size:.9rem;font-weight:600;cursor:pointer;transition:all var(--t);margin-bottom:12px;font-family:inherit;letter-spacing:1px}.add-btn:hover{background:var(--acc-light);border-color:var(--acc);color:var(--acc)}
.m-list{display:flex;flex-direction:column;gap:8px}
.m-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
.m-item .mi{font-size:1.5rem;width:38px;text-align:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.08))}
.m-item .mn{flex:1;font-weight:600;font-size:.9rem}
.m-item .ma{display:flex;gap:8px}
.m-btn{padding:8px 14px;border:none;border-radius:var(--rs);cursor:pointer;font-size:.78rem;font-weight:600;transition:all .2s ease;font-family:inherit;letter-spacing:.3px}
.m-btn:active{transform:scale(.92)}
.m-btn.edit{background:var(--acc-light);color:var(--acc-txt)}.m-btn.edit:hover{filter:brightness(.92)}
.m-btn.del{background:var(--danger-light);color:var(--danger)}.m-btn.del:hover{filter:brightness(.92)}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:var(--overlay);animation:fadeIn .2s ease;align-items:center;justify-content:center;padding:20px}.overlay.open{display:flex}
.modal{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:var(--sh-lg);border:1px solid var(--border);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.15rem;font-weight:700;margin-bottom:24px;color:var(--txt);display:flex;align-items:center;gap:8px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--txt2);margin-bottom:6px;letter-spacing:.5px}
.fg input{width:100%;padding:12px 14px;border:2px solid var(--inp-b);border-radius:12px;font-size:.9rem;background:var(--inp);color:var(--txt);transition:border var(--t),box-shadow var(--t);outline:none;font-family:inherit}
.fg input:focus{border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-light)}
.fg input::placeholder{color:var(--txt3)}
.ep{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.ep .epi{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border-radius:12px;border:2px solid transparent;cursor:pointer;transition:all .2s ease;background:var(--bg)}
.ep .epi:hover,.ep .epi.sel{border-color:var(--acc);background:var(--acc-light);transform:scale(1.1);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cp{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.cp .cpi{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.08)}.cp .cpi:hover,.cp .cpi.sel{border-color:var(--txt);transform:scale(1.2);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.ma2{display:flex;gap:10px;margin-top:24px}
.ma2 button{flex:1;padding:12px;border:none;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s ease;font-family:inherit;letter-spacing:.5px}
.ma2 button:active{transform:scale(.95)}
.ma2 .cancel{background:var(--bg2);color:var(--txt2)}.ma2 .cancel:hover{filter:brightness(.95)}
.ma2 .confirm{background:linear-gradient(135deg,var(--acc),var(--acc2));color:white;box-shadow:0 4px 14px rgba(0,0,0,.12)}.ma2 .confirm:hover{filter:brightness(1.08)}

.t-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:var(--overlay);animation:fadeIn .2s ease;align-items:center;justify-content:center;padding:20px}.t-panel.open{display:flex}
.t-pc{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;padding:28px 24px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh-lg);border:1px solid var(--border);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
.t-ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.t-ph h3{font-size:1.1rem;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
.t-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.t-opt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 8px;border-radius:14px;border:2px solid transparent;cursor:pointer;transition:all .2s ease;background:var(--bg)}
.t-opt:active{transform:scale(.95)}
.t-opt:hover{border-color:var(--txt3)}
.t-opt.active{border-color:var(--acc);background:var(--acc-light);box-shadow:0 0 0 1px var(--acc),0 2px 8px rgba(0,0,0,.04)}
.t-prev{width:52px;height:52px;border-radius:50%;border:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s ease}.t-opt.active .t-prev{transform:scale(1.05)}
.t-opt span{font-size:.72rem;font-weight:600;color:var(--txt2);text-align:center}
.t-ph .close-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s ease;font-family:inherit}.t-ph .close-btn:active{transform:scale(.9)}

.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(0);background:var(--txt);color:var(--card);padding:14px 28px;border-radius:28px;font-size:.85rem;font-weight:600;z-index:200;animation:toastIn .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)}
@keyframes toastIn{0%{transform:translateX(-50%) translateY(30px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

@supports(padding-top:env(safe-area-inset-top)){.app{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:max(120px,calc(env(safe-area-inset-bottom) + 100px))}}
@media(prefers-color-scheme:dark){[data-theme="latte"],[data-theme="peach"],[data-theme="ocean"],[data-theme="sunset"]{--overlay:rgba(0,0,0,.45)}}
</style>
</head>
<body data-theme="latte">
<div class="app">
    <div class="header">
        <div class="title"><span class="title-icon">✦</span> 习惯打卡</div>
        <div class="actions">
            <span class="badge" id="badge"></span>
            <button class="icon-btn" onclick="openTheme()" title="切换主题">🎨</button>
        </div>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="today" onclick="showTab('today')"><span class="ti">✨</span>今日</button>
        <button class="tab" data-tab="calendar" onclick="showTab('calendar')"><span class="ti">📅</span>日历</button>
        <button class="tab" data-tab="stats" onclick="showTab('stats')"><span class="ti">📈</span>统计</button>
        <button class="tab" data-tab="manage" onclick="showTab('manage')"><span class="ti">💎</span>管理</button>
    </div>
    <div class="content active" id="tab-today"><div class="list" id="today-list"></div></div>
    <div class="content" id="tab-calendar">
        <div class="cal-nav">
            <button onclick="calPrev()">◀</button>
            <span class="cal-title" id="cal-title"></span>
            <button onclick="calNext()">▶</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="content" id="tab-stats">
        <div class="stats-grid" id="stats-grid"></div>
        <div class="stat-list" id="stats-list"></div>
    </div>
    <div class="content" id="tab-manage">
        <button class="add-btn" onclick="openAdd()">+ 添加新习惯</button>
        <div class="m-list" id="m-list"></div>
    </div>
</div>

<div class="t-panel" id="t-panel"><div class="t-pc">
    <div class="t-ph"><h3>🎨 选择主题</h3><button class="close-btn" onclick="closeTheme()">✕</button></div>
    <div class="t-grid" id="t-grid"></div>
</div></div>

<div class="overlay" id="modal"><div class="modal">
    <h3 id="modal-title">✨ 添加习惯</h3>
    <div class="fg"><label>习惯名称</label><input type="text" id="name-input" placeholder="例如：晨跑30分钟" maxlength="30"></div>
    <div class="fg"><label>选择图标</label><div class="ep" id="ep"></div></div>
    <div class="fg"><label>主题色</label><div class="cp" id="cp"></div></div>
    <div class="ma2">
        <button class="cancel" onclick="closeModal()">取消</button>
        <button class="confirm" onclick="saveHabit()">保存</button>
    </div>
</div></div>

<script>
const EMOJIS=['🌸','🎧','🌙','☕','🎯','✨','💪','🏃','🎨','🌱','🍳','📝','🌈','🎬','🧘','🦋','🧋','🎮','📖','🚴'];
const COLORS=['#ff6b6b','#00d2d3','#a29bfe','#feca57','#00b894','#fd79a8','#74b9ff','#e17055','#00cec9','#e84393'];
const THEMES={'latte':'奶油拿铁 ☕','mint':'薄荷苏打 🌿','peach':'蜜桃乌龙 🍑','ocean':'海盐汽水 🌊','sunset':'落日海岸 🌅','midnight':'星空午夜 ✨'};
const TPREV={'latte':'#f5ece3','mint':'#e4f0e4','peach':'#f4e4ea','ocean':'#e4eef4','sunset':'#f4e8d8','midnight':'#1a1a2e'};
let habits=[],editing=null,calY,calM;
const LS='habit_data';
function loadData(){try{const d=JSON.parse(localStorage.getItem(LS));if(d&&d.habits)habits=d.habits;if(d&&d.theme){document.body.dataset.theme=d.theme}}catch(e){}}
function saveData(){localStorage.setItem(LS,JSON.stringify({habits,theme:document.body.dataset.theme}))}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function dim(y,m){return new Date(y,m,0).getDate()}
function fdm(y,m){return new Date(y,m-1,1).getDay()}
function showTab(t){document.querySelectorAll('.content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');document.querySelector('.tab[data-tab="'+t+'"]').classList.add('active');if(t==='calendar')renderCal();if(t==='stats')renderStats();if(t==='manage')renderManage()}
function toast(m){const o=document.querySelector('.toast');if(o)o.remove();const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .35s';setTimeout(()=>e.remove(),400)},2000)}
function $(id){return document.getElementById(id)}
function init(){loadData();const n=new Date();calY=n.getFullYear();calM=n.getMonth()+1;const w=['日','一','二','三','四','五','六'];$('badge').textContent=(calM)+'月'+n.getDate()+'日 周'+w[n.getDay()];renderToday();showTab('today');renderThemePanel()}
function renderToday(){const l=$('today-list');if(habits.length===0){l.innerHTML='<div class="empty"><span class="ei">🌸</span><p>还没有习惯呢～<br>来创建你的第一个习惯吧！</p><button class="add-first" onclick="showTab(\'manage\')">+ 开始创建</button></div>';return}const t=today();l.innerHTML=habits.map(h=>{const ck=h.checkins&&h.checkins[t];return '<div class="card" style="--c-acc:'+h.color+';--c-acc2:'+h.color+'aa"><div class="emoji">'+h.emoji+'</div><div class="info"><div class="name">'+h.name+'</div><div class="meta"><span class="ml '+(ck?'ml-done':'ml-pend')+'">'+(ck?'✓ 已完成':'⏳ 待完成')+'</span></div></div><button class="check'+(ck?' checked':'')+'" onclick="toggle('+h.id+')" data-hid="'+h.id+'">'+(ck?'✓':'')+'</button></div>'}).join('')}
function toggle(id){const t=today();const h=habits.find(x=>x.id===id);if(!h)return;if(!h.checkins)h.checkins={};if(h.checkins[t]){delete h.checkins[t];toast('已取消 ✓')}else{h.checkins[t]=true;toast('打卡成功 🎉');confetti()}saveData();renderToday();var at=document.querySelector('.content.active');if(at&&at.id==='tab-calendar')renderCal();if(at&&at.id==='tab-stats')renderStats()}
function confetti(){const c=document.createElement('div');c.className='confetti';for(let i=0;i<16;i++){const s=document.createElement('span');const clrs=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#a29bfe'];s.style.cssText='left:'+(Math.random()*120-60)+'px;background:'+clrs[i%clrs.length]+';animation-delay:'+(Math.random()*.4)+'s;width:'+(4+Math.random()*8)+'px;height:'+(4+Math.random()*8)+'px';c.appendChild(s)}document.body.appendChild(c);setTimeout(()=>c.remove(),1800)}
function renderCal(){$('cal-title').textContent=calY+'年'+calM+'月';const g=$('cal-grid');let h='<div class="cal-hdr">日</div><div class="cal-hdr">一</div><div class="cal-hdr">二</div><div class="cal-hdr">三</div><div class="cal-hdr">四</div><div class="cal-hdr">五</div><div class="cal-hdr">六</div>';const d=dim(calY,calM),sd=fdm(calY,calM),t=today();const map={};habits.forEach(hb=>{if(hb.checkins)Object.keys(hb.checkins).forEach(d=>{map[d]=(map[d]||0)+1})});for(let i=0;i<sd;i++)h+='<div class="cal-day other"></div>';for(let i=1;i<=d;i++){const ds=fmt(calY,calM,i),isT=ds===t,c=map[ds]||0;h+='<div class="cal-day'+(isT?' today':'')+'"><span>'+i+'</span>'+(c>0?'<div class="dot"></div>':'')+'</div>'}g.innerHTML=h}
function calPrev(){calM--;if(calM<1){calM=12;calY--}renderCal()}
function calNext(){calM++;if(calM>12){calM=1;calY++}renderCal()}
function renderStats(){const s=habits.map(h=>{let streak=0,longest=0,cur=0,prev=null,total=0,monthC=0;const n=new Date();const ms=fmt(n.getFullYear(),n.getMonth()+1,1);let nd=new Date(n.getFullYear(),n.getMonth()+1,1);const me=fmt(nd.getFullYear(),nd.getMonth()+1,1);const md=(new Date(n.getFullYear(),n.getMonth()+1,0)).getDate();const t=today(),ck=h.checkins&&h.checkins[t];if(h.checkins){const dates=Object.keys(h.checkins).sort();total=dates.length;const td=new Date();let dd=new Date(td);while(true){const ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');if(h.checkins[ds]){streak++;dd.setDate(dd.getDate()-1)}else break}dates.forEach(ds=>{const dt=new Date(ds);if(prev===null||Math.abs((dt-prev)/86400000-1)<1e-6)cur++;else cur=1;longest=Math.max(longest,cur);prev=dt;if(ds>=ms&&ds<me)monthC++})}const mr=md>0?Math.round(monthC/md*100):0;return{id:h.id,name:h.name,emoji:h.emoji,total,streak,longest,month_rate:mr,today:!!ck}});if(s.length===0){$('stats-grid').innerHTML='<div class="empty" style="grid-column:span 2"><span class="ei">📊</span><p>还没有数据</p></div>';$('stats-list').innerHTML='';return}const tc=s.filter(x=>x.today).length,ls=Math.max(...s.map(x=>x.longest)),ar=s.length>0?Math.round(s.reduce((a,x)=>a+x.month_rate,0)/s.length):0;$('stats-grid').innerHTML='<div class="stat-card"><div class="sv">'+s.length+'</div><div class="sl">习惯总数</div></div><div class="stat-card"><div class="sv">'+tc+'</div><div class="sl">今日完成</div></div><div class="stat-card"><div class="sv">'+ar+'%</div><div class="sl">月均完成率</div></div><div class="stat-card"><div class="sv">'+ls+'</div><div class="sl">最长连击</div></div>';$('stats-list').innerHTML=s.map(x=>'<div class="stat-item"><div class="stat-hdr"><span class="se">'+x.emoji+'</span><span class="sn">'+x.name+'</span></div><div class="stat-row"><span>当前连击</span><span class="sv2">'+x.streak+' 天</span></div><div class="stat-row"><span>最长连击</span><span class="sv2">'+x.longest+' 天</span></div><div class="stat-row"><span>本月完成率</span><span class="sv2">'+x.month_rate+'%</span></div><div class="stat-row"><span>总打卡</span><span class="sv2">'+x.total+' 次</span></div><div class="stat-bar"><div class="fill" style="width:'+x.month_rate+'%"></div></div></div>').join('')}
function renderManage(){$('m-list').innerHTML=habits.map(h=>'<div class="m-item"><span class="mi">'+h.emoji+'</span><span class="mn">'+h.name+'</span><div class="ma"><button class="m-btn edit" onclick="openEdit('+h.id+')">编辑</button><button class="m-btn del" onclick="delHabit('+h.id+')">删除</button></div></div>').join('')}
function openAdd(){editing=null;$('modal-title').textContent='✨ 添加习惯';$('name-input').value='';$('name-input').placeholder='例如：晨跑30分钟';setupPicker(null,null);$('modal').classList.add('open');setTimeout(()=>$('name-input').focus(),200)}
function openEdit(id){const h=habits.find(x=>x.id===id);if(!h)return;editing=h;$('modal-title').textContent='✏️ 编辑习惯';$('name-input').value=h.name;setupPicker(h.emoji,h.color);$('modal').classList.add('open');setTimeout(()=>$('name-input').focus(),200)}
function closeModal(){$('modal').classList.remove('open')}
function setupPicker(emoji,color){$('ep').innerHTML=EMOJIS.map(e=>'<div class="epi'+(e===emoji?' sel':'')+'" onclick="selE(this)">'+e+'</div>').join('');$('cp').innerHTML=COLORS.map(c=>'<div class="cpi'+(c===color?' sel':'')+'" style="background:'+c+'" onclick="selC(this)" data-c="'+c+'"></div>').join('')}
function selE(el){document.querySelectorAll('.ep .epi').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')}
function selC(el){document.querySelectorAll('.cp .cpi').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')}
function getE(){const s=document.querySelector('.ep .epi.sel');return s?s.textContent:EMOJIS[0]}
function getC(){const s=document.querySelector('.cp .cpi.sel');return s?s.dataset.c:COLORS[0]}
function saveHabit(){const n=$('name-input').value.trim();if(!n){toast('请输入习惯名称');return}const e=getE(),c=getC();if(editing){editing.name=n;editing.emoji=e;editing.color=c;toast('习惯已更新 ✨')}else{habits.push({id:Date.now(),name:n,emoji:e,color:c,checkins:{}});toast('新习惯已添加 🎉')}closeModal();saveData();renderToday();renderManage()}
function delHabit(id){if(!confirm('确定要删除吗？打卡记录也会一起删除。'))return;habits=habits.filter(h=>h.id!==id);saveData();renderToday();renderManage();toast('已删除')}
function openTheme(){renderThemePanel();$('t-panel').classList.add('open')}
function closeTheme(){$('t-panel').classList.remove('open')}
function renderThemePanel(){const cur=document.body.dataset.theme;const names={'latte':'奶油拿铁','mint':'薄荷苏打','peach':'蜜桃乌龙','ocean':'海盐汽水','sunset':'落日海岸','midnight':'星空午夜'};$('t-grid').innerHTML=Object.keys(THEMES).map(k=>'<div class="t-opt'+(k===cur?' active':'')+'" onclick="selTheme(\''+k+'\')"><div class="t-prev" style="background:'+TPREV[k]+';'+(k==='midnight'?'border-color:#444470;box-shadow:0 0 8px rgba(100,100,200,.3)':'')+'"></div><span>'+names[k]+'</span></div>').join('')}
function selTheme(k){document.body.dataset.theme=k;saveData();renderThemePanel();toast('已切换 '+THEMES[k])}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTheme()}if(e.key==='Enter'&&$('modal').classList.contains('open'))saveHabit()})
$('t-panel').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTheme()})
$('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()})
init()
</script>
</body>
</html>
